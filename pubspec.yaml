name: label_print
description: "Label Print - Ứng dụng in nhãn chuyên nghiệp"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_bloc: ^8.1.0
  equatable: ^2.0.0
  dartz: ^0.10.0
  get_it: ^8.0.0
  sqflite: ^2.4.0
  path: ^1.9.0
  barcode: ^2.2.0
  barcode_widget: ^2.0.0
  google_fonts: ^6.2.0
  google_mobile_ads: ^5.2.0
  go_router: ^14.0.0
  flutter_blue_plus: ^1.35.0
  receive_sharing_intent: ^1.8.1
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/

